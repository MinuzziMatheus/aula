- name: Instalar Finance API, Docker e Jenkins
  hosts: finance
  become: true

  vars:
    app_dir: /opt/finance-api
    repo_url: https://github.com/MinuzziMatheus/aula.git
    repo_branch: master

    install_jenkins: true
    jenkins_image: finance-api-jenkins
    jenkins_container: finance-api-jenkins
    jenkins_home: /opt/jenkins_home
    jenkins_http_port: 8080
    jenkins_agent_port: 50000
    jenkins_job_name: finance-api-pipeline

    configure_firewall: true
    firewall_ports:
      - "{{ jenkins_http_port }}"
      - 3000
      - 3001
      - 3002

    subir_ambientes: true
    ambientes:
      - local
      - hml
      - prod

  tasks:
    - name: Instalar dependencias base
      apt:
        name:
          - ca-certificates
          - curl
          - git
          - docker.io
          - docker-compose-plugin
          - ufw
          - python3
        state: present
        update_cache: true

    - name: Garantir Docker habilitado e rodando
      service:
        name: docker
        state: started
        enabled: true

    - name: Adicionar usuario remoto ao grupo docker
      user:
        name: "{{ ansible_user | default(ansible_env.SUDO_USER | default(ansible_env.USER)) }}"
        groups: docker
        append: true
      when: ansible_user is defined or ansible_env.SUDO_USER is defined or ansible_env.USER is defined

    - name: Liberar SSH no firewall
      ufw:
        rule: allow
        name: OpenSSH
      when: configure_firewall

    - name: Liberar portas da aplicacao no firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ firewall_ports }}"
      when: configure_firewall

    - name: Habilitar firewall
      ufw:
        state: enabled
        policy: deny
      when: configure_firewall

    - name: Clonar ou atualizar repositorio da API
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: true

    - name: Obter grupo do docker.sock
      stat:
        path: /var/run/docker.sock
      register: docker_sock
      when: install_jenkins

    - name: Criar diretorio de dados do Jenkins
      file:
        path: "{{ jenkins_home }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      when: install_jenkins

    - name: Buildar imagem customizada do Jenkins
      command: docker build -t {{ jenkins_image }} ./jenkins
      args:
        chdir: "{{ app_dir }}"
      when: install_jenkins

    - name: Remover container antigo do Jenkins
      command: docker rm -f {{ jenkins_container }}
      register: remove_jenkins
      failed_when: false
      changed_when: remove_jenkins.rc == 0
      when: install_jenkins

    - name: Subir Jenkins com acesso ao Docker
      command: >
        docker run -d
        --name {{ jenkins_container }}
        --restart unless-stopped
        -p {{ jenkins_http_port }}:8080
        -p {{ jenkins_agent_port }}:50000
        -v {{ jenkins_home }}:/var/jenkins_home
        -v /var/run/docker.sock:/var/run/docker.sock
        --group-add {{ docker_sock.stat.gid }}
        -e FINANCE_JOB_NAME={{ jenkins_job_name }}
        -e FINANCE_REPO_URL={{ repo_url }}
        -e FINANCE_REPO_BRANCH={{ repo_branch }}
        {{ jenkins_image }}
      when: install_jenkins

    - name: Subir ambientes da API
      command: >
        docker compose
        -p finance-api-{{ item }}
        -f docker-compose.yml
        -f docker-compose.{{ item }}.yml
        up -d --build
      args:
        chdir: "{{ app_dir }}"
      loop: "{{ ambientes }}"
      when: subir_ambientes

    - name: Mostrar URLs dos ambientes
      debug:
        msg:
          - "Jenkins: http://localhost:{{ jenkins_http_port }}"
          - "Local:   http://localhost:3000/health"
          - "HML:     http://localhost:3001/health"
          - "Prod:    http://localhost:3002/health"
