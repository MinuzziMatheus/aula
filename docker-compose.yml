services:
  db:
    build:
      context: ./docker
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-finance_api}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-finance_api}
      DB_USER: postgres
      DB_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
